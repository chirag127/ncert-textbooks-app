# Prerelease — on push to main, build and cut a deterministic prerelease.
# Tag: prerelease-<UTCdate>-<shortsha>. Attaches the built dist as a tarball.
name: prerelease

on:
  push:
    branches: [main]
    tags-ignore:
      - "**"
  workflow_dispatch:

# Per-ref group; a newer push cancels an in-flight run.
concurrency:
  group: prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prerelease:
    # Guard against recursion: tag pushes never trigger this (tags-ignore),
    # and skip if the head commit is an automated release bump.
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Compute tag
        id: meta
        run: |
          date="$(date -u +%Y%m%d)"
          short="$(git rev-parse --short HEAD)"
          echo "tag=prerelease-${date}-${short}" >> "$GITHUB_OUTPUT"

      - name: Package dist
        run: tar -czf "ncert-dist-${{ steps.meta.outputs.tag }}.tar.gz" -C dist .

      - name: Publish prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: ncert-dist-${{ steps.meta.outputs.tag }}.tar.gz
